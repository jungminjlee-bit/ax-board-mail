
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>AX 실행과제 평가 보드</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg:#f7f7f7; --panel:#fff; --border:#ccc; --blue:#0078ff;
      --muted:#555; --ok:#0a7f2e; --err:#d20000;
      /* ⬇️ 카드 회색 팔레트(추가) */
      --card-bg:#f0f2f5;
      --card-border:#cfd4da;
      --card-text:#2b2f33;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; background:var(--bg);
      font:15px/1.45 system-ui, Segoe UI, Roboto, 'Noto Sans KR', sans-serif;
      color:#222;
    }
    header{
      padding:18px 22px; background:#fff;
      border-bottom:1px solid var(--border);
      position:sticky; top:0; z-index:10;
    }
    header h1{ margin:0 0 6px; font-size:22px; font-weight:700; }
    header .sub{ color:var(--muted); font-size:14px; }

    .wrap{ padding:20px 22px; }

    /* 입력 폼 */
    .form{ display:flex; gap:14px; flex-wrap:wrap; margin-bottom:12px; align-items:flex-end; }
    .input{ display:flex; flex-direction:column; gap:4px; }
    label{ font-weight:600; }
    input{
      width:200px; padding:8px 10px;
      border:1px solid var(--border); border-radius:6px;
      background:#fff;
    }
    .btn{
      padding:10px 14px; border:none;
      background:var(--blue); color:#fff; font-weight:600;
      border-radius:6px; cursor:pointer;
    }
    .btn[disabled]{ opacity:.6; cursor:not-allowed; }

    .note{ margin:8px 0 16px; color:var(--muted); }
    .note .err{ color:var(--err); font-weight:700; }
    .note .ok{ color:var(--ok); font-weight:700; }

    /* 보드 전체 */
    .boards{
      display:grid; gap:18px;
      grid-template-columns:1fr 1fr;
    }

    /* 보드 패널 */
    .board{
      background:#fff; border:1px solid var(--border);
      border-radius:10px; overflow:hidden;
    }
    .board h2{
      margin:0; padding:10px 14px;
      font-size:17px; border-bottom:1px solid var(--border);
      background:#fafafa; display:flex; align-items:center; gap:8px;
    }

    /* 4칸 */
    .levels{ display:grid; grid-template-columns:repeat(4,1fr); }

    .level{ border-right:1px solid var(--border); }
    .level:last-child{ border-right:none; }
    .head{
      padding:8px 10px; display:flex; justify-content:center; align-items:center; gap:8px;
      border-bottom:1px solid var(--border);
      background:#fcfcfc; font-weight:600; font-size:14px; text-align:center;
    }

    /* 카운터 배지 */
    .badge{
      display:inline-flex; align-items:center; justify-content:center;
      width:22px; height:22px; border-radius:50%;
      background:#eaf2ff; color:#0b57d0; border:1px solid #c6dafc;
      font-size:12px; font-weight:700; line-height:1;
    }

    .drop{
      min-height:220px; padding:10px;
      display:flex; flex-direction:column; gap:8px;
      background:#fff;
    }
    .drop.dragover{
      outline:2px dashed var(--blue); background:#eaf2ff;
    }

    /* ⬇️ 카드: 회색 톤 */
    .card{
      padding:8px 10px;
      background:var(--card-bg, #f0f2f5);          /* fallback 포함 */
      border:1px solid var(--card-border, #cfd4da);
      border-radius:6px;
      color:var(--card-text, #2b2f33);
      cursor:grab; user-select:none;
      box-shadow:none;
    }
    .card:active{ cursor:grabbing; }
    .id{ font-weight:700; margin-right:6px; color:#222; }

    @media (max-width: 1100px){
      .boards{ grid-template-columns:1fr; }
    }
  </style>
</head>

<body>
<header>
  <h1>과제 평가 보드</h1>
  <div class="sub">
    팀/이름 입력 → 드래그&드롭하여 High/Medium/Low 배치 → <strong>제출</strong>
  </div>
</header>

<div class="wrap">

  <!-- 입력폼 -->
  <div class="form">
    <div class="input">
      <label for="team">팀</label>
      <input id="team" placeholder="예: 마케팅팀" />
    </div>
    <div class="input">
      <label for="name">이름</label>
      <input id="name" placeholder="예: 홍길동" />
    </div>
    <button id="submitBtn" class="btn">제출</button>
  </div>

  <div id="msg" class="note">
    ※ 모두 분류 후 제출을 클릭하세요.
  </div>

  <!-- 드래그 보드 -->
  <div class="boards">

    <!-- IMPACT -->
    <section class="board" data-group="impact">
      <h2>Business Impact (영향)</h2>
      <div class="levels">
        <div class="level">
          <div class="head">
            <span>Unassigned</span>
            <span class="badge" id="count-impact-Unassigned">0</span>
          </div>
          <div class="drop" data-group="impact" data-level="Unassigned"></div>
        </div>
        <div class="level">
          <div class="head">
            <span>High</span>
            <span class="badge" id="count-impact-High">0</span>
          </div>
          <div class="drop" data-group="impact" data-level="High"></div>
        </div>
        <div class="level">
          <div class="head">
            <span>Medium</span>
            <span class="badge" id="count-impact-Medium">0</span>
          </div>
          <div class="drop" data-group="impact" data-level="Medium"></div>
        </div>
        <div class="level">
          <div class="head">
            <span>Low</span>
            <span class="badge" id="count-impact-Low">0</span>
          </div>
          <div class="drop" data-group="impact" data-level="Low"></div>
        </div>
      </div>
    </section>

    <!-- FEASIBILITY -->
    <section class="board" data-group="feasibility">
      <h2>Feasibility (실행 가능성)</h2>
      <div class="levels">
        <div class="level">
          <div class="head">
            <span>Unassigned</span>
            <span class="badge" id="count-feasibility-Unassigned">0</span>
          </div>
          <div class="drop" data-group="feasibility" data-level="Unassigned"></div>
        </div>
        <div class="level">
          <div class="head">
            <span>High</span>
            <span class="badge" id="count-feasibility-High">0</span>
          </div>
          <div class="drop" data-group="feasibility" data-level="High"></div>
        </div>
        <div class="level">
          <div class="head">
            <span>Medium</span>
            <span class="badge" id="count-feasibility-Medium">0</span>
          </div>
          <div class="drop" data-group="feasibility" data-level="Medium"></div>
        </div>
        <div class="level">
          <div class="head">
            <span>Low</span>
            <span class="badge" id="count-feasibility-Low">0</span>
          </div>
          <div class="drop" data-group="feasibility" data-level="Low"></div>
        </div>
      </div>
    </section>

  </div><!-- boards -->

</div><!-- wrap -->

<script>
/* ===================================
   1) save-to-git endpoint
=================================== */
const WEBHOOK_URL = '/api/save';   // ← 네 엔드포인트로 설정!

/* ===================================
   2) 과제 목록
=================================== */
const TITLES = [
  "A1_AI기반 마케팅 효과 탐지/측정 자동화 및 MMM(성과 분석)",
  "A2_AI 생성 기반 마케팅 기획안 자동 생성·추천 엔진",
  "A3_가상고객 기반 마케팅 시나리오 시뮬레이션 AI",
  "A4_투숙객/예약 정보 연계 기반 객실 정비 우선순위 및 스케줄링 최적화",
  "A5_실시간 보안 모니터링 및 이상징후 탐지 인텔리전스",
  "A6_ML 기반 매출 이상 탐지 및 원인 파악 인사이트 도출",
  "B1_운반/청소 로보틱스 PoC",
  "B2_위험/고난도 작업 수행 및 비전AI 품질 검사 PoC",
  "C1_신규호텔개발 위한 AI기반 Market Intelligence",
  "C2_신규호텔개발 AI 타당성 분석 및 시뮬레이션",
  "C3_AI 기반 상품기획 리서치 인사이트 발굴",
  "C4_AI 기반 멤버십 경쟁사 비교·분석 리서치",
  "C5_멤버십 정책·약관 분석 Copilot",
  "C6_B2B 수요 발굴 및 고가치 타겟 고객사 선정 인텔리전스",
  "D1_AI/AR 기반 글로벌 및 현장 교육·학습 지원",
  "D2_리스크/컴플라이언스 검토 위한 Archive AI 설계",
  "D3_법무/계약 조항 식별 및 현지화 Copilot",
  "E1_ML 기반 고객문의 분류 및 응답 매핑 자동화",
  "E2_실시간 AI 상담 가이드",
  "F1_AI 기반 터치포인트 확장 및 고도화",
  "F2_AI 컨시어지",
  "G1_AI 분석 기반 고객 세그먼테이션 및 맞춤형 오퍼 생성",
  "G2_고객 E2E 여정 기반 초개인화 호텔 경험 제공 AI",
  "G3_AEO·GEO 기반 호텔 검색·추천·지식 경험 최적화",
  "H1_설비 검침·공조 제어·에너지 최적화 AI",
  "H2_공사 예가 산정 자동화 AI",
  "H3_ITSM/보안포털 자동 처리 AI",
  "H4_전표 생성 및 처리 자동화",
  "H5_ML 기반 소모품 수요예측 및 발주 자동화",
  "H6_고객 안내용 컨텐츠 AI생성 및 품의 생성 자동화",
  "H7_프로퍼티별 이슈/이벤트 요약 및 보도자료 주제 추천",
  "H8_상품/서비스 문의 요약 기반 견적 생성 자동화 (B2B 영업 대상)",
  "H9_주요 경쟁사 및 자사 보도자료 기반 보고문서 생성 AI",
  "H10_부정 이슈 관련 내/외부 조치 업무 제안(문서초안 자동 생성)",
  "H11_체크리스트 및 업무 추적관리 워크플로우",
  "H12_개인정보보호 인식 제고용 뉴스레터 AI 콘텐츠 제작"
];

let state = {
  tasks: [],
  assign:{
    impact:{Unassigned:[],High:[],Medium:[],Low:[]},
    feasibility:{Unassigned:[],High:[],Medium:[],Low:[]}
  }
};

/* ===================================
   3) 초기 데이터 구성
=================================== */
function buildTasks(){
  const arr=[];
  for(let i=1;i<=36;i++){
    arr.push({
      id:"AX"+String(i).padStart(2,"0"),
      title:TITLES[i-1]
    });
  }
  return arr;
}

function getLevel(group,id){
  const g=state.assign[group];
  for(const lv of ["High","Medium","Low","Unassigned"]){
    if(g[lv].includes(id)) return lv;
  }
  return "Unassigned";
}

/* ===================================
   4) 드래그 보드 렌더링 + 카운트 업데이트
=================================== */
function moveTo(group,level,id){
  const g=state.assign[group];
  for(const lv of Object.keys(g)){
    const idx=g[lv].indexOf(id);
    if(idx>=0) g[lv].splice(idx,1);
  }
  g[level].push(id);
  render();
}

function createCard(t){
  const el=document.createElement("div");
  el.className="card";
  el.draggable=true;
  el.dataset.id=t.id;
  el.innerHTML=`<span class="id">${t.id}</span>${t.title}`;
  el.addEventListener("dragstart",e=>{
    e.dataTransfer.setData("text",t.id);
  });
  return el;
}

function render(){
  document.querySelectorAll(".drop").forEach(el=>el.innerHTML="");
  ["impact","feasibility"].forEach(group=>{
    Object.keys(state.assign[group]).forEach(level=>{
      const drop=document.querySelector(`.drop[data-group="${group}"][data-level="${level}"]`);
      state.assign[group][level].forEach(id=>{
        const t=state.tasks.find(x=>x.id===id);
        drop.appendChild(createCard(t));
      });
    });
  });
  updateCounts(); // ← 렌더 후 카운터 갱신
}

function wireDnD(){
  document.querySelectorAll(".drop").forEach(drop=>{
    drop.addEventListener("dragover",e=>{
      e.preventDefault();
      drop.classList.add("dragover");
    });
    drop.addEventListener("dragleave",()=>drop.classList.remove("dragover"));
    drop.addEventListener("drop",e=>{
      e.preventDefault();
      drop.classList.remove("dragover");
      const id=e.dataTransfer.getData("text");
      moveTo(drop.dataset.group,drop.dataset.level,id);
    });
  });
}

/* === 카운터 배지 업데이트 === */
function updateCounts(){
  const groups=["impact","feasibility"];
  const levels=["Unassigned","High","Medium","Low"];
  for(const g of groups){
    for(const lv of levels){
      const el = document.getElementById(`count-${g}-${lv}`);
      if(el){
        const count = state.assign[g][lv].length;
        el.textContent = count;
      }
    }
  }
}

/* ===================================
   5) 제출 → Git 저장 요청
=================================== */
async function handleSubmit(){
  const team=document.getElementById("team").value.trim();
  const name=document.getElementById("name").value.trim();
  const msg=document.getElementById("msg");
  const btn=document.getElementById("submitBtn");

  if(!team||!name){
    msg.innerHTML='<span class="err">팀/이름 입력 필요</span>';
    return;
  }

  const items=state.tasks.map(t=>({
    projectId:t.id,
    projectTitle:t.title,
    impact:getLevel("impact",t.id),
    feasibility:getLevel("feasibility",t.id)
  }));

  const payload={
    team,name,
    timestamp:new Date().toISOString(),
    data:items
  };

  btn.disabled=true;
  btn.textContent="저장 중...";
  msg.innerHTML="저장 중...";

  try{
    const res=await fetch(WEBHOOK_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(payload)
    });
    if(!res.ok) throw new Error(res.status);

    msg.innerHTML='<span class="ok">Git 저장 완료!</span>';
    btn.textContent="저장 완료";

  }catch(e){
    console.error(e);
    msg.innerHTML='<span class="err">저장 실패</span>';
    btn.disabled=false;
    btn.textContent="제출";
  }
}

/* ===================================
   6) 초기화
=================================== */
function init(){
  state.tasks=buildTasks();
  const ids = state.tasks.map(t=>t.id);
  state.assign.impact.Unassigned=[...ids];
  state.assign.feasibility.Unassigned=[...ids];
  render();
  wireDnD();
  document.getElementById("submitBtn").addEventListener("click",handleSubmit);
}

init();
</script>
</body>
</html>
