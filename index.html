
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>AX 실행과제 평가 보드</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg:#f7f7f7; --panel:#fff; --border:#ccc; --blue:#0078ff;
      --muted:#555; --ok:#0a7f2e; --err:#d20000;
      --card-bg:#f0f2f5; --card-border:#cfd4da; --card-text:#2b2f33;

      /* Sticky 오프셋 (JS가 런타임에 세팅) */
      --sticky-top: 64px;     /* 페이지 header 높이 */
      --board-title-h: 40px;  /* 각 보드 h2 높이(공통 가정) */
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; background:var(--bg);
      font:15px/1.45 system-ui, Segoe UI, Roboto, 'Noto Sans KR', sans-serif;
      color:#222;
    }

    /* 페이지 상단 고정 헤더 */
    header{
      padding:18px 22px; background:#fff;
      border-bottom:1px solid var(--border);
      position:sticky; top:0; z-index:100;
    }
    header h1{ margin:0 0 6px; font-size:22px; font-weight:700; }
    header .sub{ color:var(--muted); font-size:14px; }

    .wrap{ padding:20px 22px; }

    /* 입력 폼 */
    .form{ display:flex; gap:14px; flex-wrap:wrap; margin-bottom:12px; align-items:flex-end; }
    .input{ display:flex; flex-direction:column; gap:4px; }
    label{ font-weight:600; }
    input{
      width:200px; padding:8px 10px;
      border:1px solid var(--border); border-radius:6px;
      background:#fff;
    }
    .btn{
      padding:10px 14px; border:none;
      background:var(--blue); color:#fff; font-weight:600;
      border-radius:6px; cursor:pointer;
    }
    .btn[disabled]{ opacity:.6; cursor:not-allowed; }

    .note{ margin:8px 0 16px; color:var(--muted); }
    .note .err{ color:var(--err); font-weight:700; }
    .note .ok{ color:var(--ok); font-weight:700; }

    /* 보드 전체 */
    .boards{
      display:grid; gap:18px;
      grid-template-columns:1fr 1fr;
    }

    /* 보드 패널 */
    .board{
      background:#fff; border:1px solid var(--border);
      border-radius:10px;
      overflow:visible; /* sticky 요소 보이도록 */
    }

    /* ★ 보드 제목(h2)도 sticky 고정 */
    .board h2{
      margin:0; padding:10px 14px;
      font-size:17px; border-bottom:1px solid var(--border);
      background:#fafafa; display:flex; align-items:center; gap:8px;
      position: sticky;
      top: var(--sticky-top);     /* 페이지 header 바로 아래 고정 */
      z-index: 30;                /* 열 헤더보다 위 */
      box-shadow: 0 1px 0 rgba(0,0,0,0.03);
    }

    /* 4칸 그리드 */
    .levels{ display:grid; grid-template-columns:repeat(4,1fr); }
    .level{ border-right:1px solid var(--border); position:relative; }
    .level:last-child{ border-right:none; }

    /* ★ 각 열 헤더(head)도 sticky: 보드 제목 아래에 고정 */
    .head{
      display:flex; justify-content:center; align-items:center; gap:8px;
      padding:8px 10px; font-weight:600; font-size:14px; text-align:center;
      border-bottom:1px solid var(--border); background:#fcfcfc;
      position: sticky;
      top: calc(var(--sticky-top) + var(--board-title-h));
      z-index: 20;
      box-shadow: 0 1px 0 rgba(0,0,0,0.02);
    }

    /* 카운터 배지 */
    .badge{
      display:inline-flex; align-items:center; justify-content:center;
      width:22px; height:22px; border-radius:50%;
      background:#eaf2ff; color:#0b57d0; border:1px solid #c6dafc;
      font-size:12px; font-weight:700; line-height:1;
    }

    .drop{
      min-height:220px; padding:10px;
      display:flex; flex-direction:column; gap:8px;
      background:#fff;
    }

    /* 카드 */
    .card{
      padding:8px 10px;
      background:var(--card-bg);
      border:1px solid var(--card-border);
      border-radius:6px;
      color:var(--card-text);
      cursor:grab; user-select:none;
      box-shadow:none;
    }
    .card:active{ cursor:grabbing; }
    .card.dragging{ opacity:.85; }
    .id{ font-weight:700; margin-right:6px; color:#222; }

    @media (max-width: 1100px){
      .boards{ grid-template-columns:1fr; }
    }
  </style>
</head>

<body>
<header>
  <h1>과제 평가 보드</h1>
  <div class="sub">
    팀/이름 입력 → 카드를 드래그해서 각 헤더 아래 영역에 <strong>드롭</strong>하면 배치 → <strong>제출</strong>
  </div>
</header>

<div class="wrap">

  <!-- 입력폼 -->
  <div class="form">
    <div class="input">
      <label for="team">팀</label>
      <input id="team" placeholder="예: DX팀" />

  <div id="msg" class="note">
    ※ 모든 카드를 High/Medium/Low에 배치한 후 제출하세요.
  </div>

  <!-- 드래그 보드 -->
  <div class="boards">

    <!-- IMPACT -->
    <section class="board" data-group="impact">
      <h2>Business Impact (영향)</h2>
      <div class="levels">
        <div class="level">
          <div class="head">
            <span>Unassigned</span>
            <span class="badge" id="count-impact-Unassigned">0</span>
          </div>

        </div>
        <div class="level">
          <div class="head">
            <span>High</span>
            <span class="badge" id="count-impact-High">0</span>
          </div>
          <div class="drop" data-group="impact" data-level="High"></div>
        </div>
        <div class="level">
          <div class="head">
            <span>Medium</span>
            <span class="badge" id="count-impact-Medium">0</span>
          </div>
          <div class="drop" data-group="impact" data-level="Medium"></div>
        </div>
        <div class="level">
          <div class="head">
            <span>Low</span>
            <span class="badge" id="count-impact-Low">0</span>
          </div>
          <div class="drop" data-group="impact" data-level="Low"></div>
        </div>
      </div>
    </section>

    <!-- FEASIBILITY -->
    <section class="board" data-group="feasibility">
      <h2>Feasibility (실행 가능성)</h2>
      <div class="levels">
        <div class="level">
          <div class="head">
            <span>Unassigned</span>
            <span class="badge" id="count-feasibility-Unassigned">0</span>
          </div>
          <div class="drop" data-group="feasibility" data-level="Unassigned"></div>
        </div>
        <div class="level">
          <div class="head">
            <span>High</span>
            <span class="badge" id="count-feasibility-High">0</span>
          </div>
          <div class="drop" data-group="feasibility" data-level="High"></div>
        </div>
        <div class="level">
          <div class="head">
            <span>Medium</span>
            <span class="badge" id="count-feasibility-Medium">0</span>
          </div>
          <div class="drop" data-group="feasibility" data-level="Medium"></div>
        </div>
        <div class="level">
          <div class="head">
            <span>Low</span>
            <span class="badge" id="count-feasibility-Low">0</span>
          </div>
          <div class="drop" data-group="feasibility" data-level="Low"></div>
        </div>
      </div>
    </section>

  </div><!-- boards -->

</div><!-- wrap -->

<script>
/* ===================================
   0) Sticky 오프셋 동적 계산
=================================== */
function setStickyOffsets(){
  const pageHeader = document.querySelector('header');
  const headerH = pageHeader ? pageHeader.offsetHeight : 0;
  document.documentElement.style.setProperty('--sticky-top', headerH + 'px');

  // 첫 번째 보드의 h2 높이 기준(두 보드 동일 가정)
  const firstH2 = document.querySelector('.board h2');
  const h2H = firstH2 ? firstH2.offsetHeight : 0;
  document.documentElement.style.setProperty('--board-title-h', h2H + 'px');
}
window.addEventListener('load', setStickyOffsets);
window.addEventListener('resize', setStickyOffsets);
window.addEventListener('load', () => setTimeout(setStickyOffsets, 200));

/* ===================================
   1) Netlify Function endpoint
=================================== */
const WEBHOOK_URL = '/.netlify/functions/save-to-github';

/* ===================================
   2) 과제 목록
=================================== */
const TITLES = [

  "A3_가상고객 기반 마케팅 시나리오 시뮬레이션 AI",
  "A4_투숙객/예약 정보 연계 기반 객실 정비 우선순위 및 스케줄링 최적화",
  "A5_실시간 보안 모니터링 및 이상징후 탐지 인텔리전스",
  "A6_ML 기반 매출 이상 탐지 및 원인 파악 인사이트 도출",
  "B1_운반/청소 로보틱스 PoC",
  "B2_위험/고난도 작업 수행 및 비전AI 품질 검사 PoC",
  "C1_신규호텔개발 위한 AI기반 Market Intelligence",
  "C2_신규호텔개발 AI 타당성 분석 및 시뮬레이션",
  "C3_AI 기반 상품기획 리서치 인사이트 발굴",
  "C4_AI 기반 멤버십 경쟁사 비교·분석 리서치",
  "C5_멤버십 정책·약관 분석 Copilot",
  "C6_B2B 수요 발굴 및 고가치 타겟 고객사 선정 인텔리전스",
  "D1_AI/AR 기반 글로벌 및 현장 교육·학습 지원",
  "D2_리스크/컴플라이언스 검토 위한 Archive AI 설계",
  "D3_법무/계약 조항 식별 및 현지화 Copilot",
  "E1_ML 기반 고객문의 분류 및 응답 매핑 자동화",
  "E2_실시간 AI 상담 가이드",
  "F1_AI 기반 터치포인트 확장 및 고도화",
  "F2_AI 컨시어지",
  "G1_AI 분석 기반 고객 세그먼테이션 및 맞춤형 오퍼 생성",
  "G2_고객 E2E 여정 기반 초개인화 호텔 경험 제공 AI",
  "G3_AEO·GEO 기반 호텔 검색·추천·지식 경험 최적화",
  "H1_설비 검침·공조 제어·에너지 최적화 AI",
  "H2_공사 예가 산정 자동화 AI",

  "H4_전표 생성 및 처리 자동화",
  "H5_ML 기반 소모품 수요예측 및 발주 자동화",
  "H6_고객 안내용 컨텐츠 AI생성 및 품의 생성 자동화",
  "H7_프로퍼티별 이슈/이벤트 요약 및 보도자료 주제 추천",
  "H8_상품/서비스 문의 요약 기반 견적 생성 자동화 (B2B 영업 대상)",
  "H9_주요 경쟁사 및 자사 보도자료 기반 보고문서 생성 AI",
  "H10_부정 이슈 관련 내/외부 조치 업무 제안(문서초안 자동 생성)",
  "H11_체크리스트 및 업무 추적관리 워크플로우",
  "H12_개인정보보호 인식 제고용 뉴스레터 AI 콘텐츠 제작"
];

let state = {
  tasks: [],
  assign:{
    impact:{Unassigned:[],High:[],Medium:[],Low:[]},
    feasibility:{Unassigned:[],High:[],Medium:[],Low:[]}
  }
};

// 드래그 상태
let draggingId = null;
let draggingEl = null;
let lastDropZone = null;
let draggingGroup = null;

// 카드 크기 & 커서 오프셋(드래그 시작 시 기록)
let dragMeta = { w:0, h:0, offX:0, offY:0 };

/* ===================================
   유틸 (정렬/부분 렌더)
=================================== */
const idNum = id => parseInt(String(id).replace(/\D+/g,''),10) || 0;
function sortById(arr){
  // 중복 제거 + 정렬
  const seen = new Set();
  const unique = [];
  for(const x of arr){ if(!seen.has(x)){ seen.add(x); unique.push(x); } }
  unique.sort((a,b)=> idNum(a) - idNum(b));
  arr.length = 0; arr.push(...unique);
}

function renderLevel(group, level){
  const drop = document.querySelector(`.drop[data-group="${group}"][data-level="${level}"]`);
  if (!drop) return;
  drop.innerHTML = '';
  const list = state.assign[group][level];
  list.forEach(id=>{
    const t = state.tasks.find(x=>x.id===id);
    drop.appendChild(createCard(t));
  });
}

/* ===================================
   3) 초기 데이터 구성
=================================== */
function buildTasks(){
  const arr=[];
  for(let i=1;i<=36;i++){
    arr.push({ id:"AX"+String(i).padStart(2,"0"), title:TITLES[i-1] });
  }
  return arr;
}

function getLevel(group,id){
  const g=state.assign[group];
  for(const lv of ["High","Medium","Low","Unassigned"]){
    if(g[lv].includes(id)) return lv;
  }
  return "Unassigned";
}

/* ===================================
   4) 카드 DOM 생성
=================================== */
function createCard(t){
  const el=document.createElement("div");
  el.className="card";
  el.draggable=true;
  el.dataset.id=t.id;
  el.innerHTML=`<span class="id">${t.id}</span>${t.title}`;

  el.addEventListener("dragstart",e=>{
    draggingId = t.id;
    draggingEl = el;
    lastDropZone = null;
    const board = el.closest('.board');
    draggingGroup = board ? board.dataset.group : null;

    // 카드 실제 크기 및 '마우스가 찍힌 지점' 오프셋 기록
    const r = el.getBoundingClientRect();
    const cx = e.clientX ?? (r.left + r.width/2);
    const cy = e.clientY ?? (r.top  + r.height/2);
    dragMeta.w = r.width;
    dragMeta.h = r.height;
    dragMeta.offX = cx - r.left;
    dragMeta.offY = cy - r.top;

    el.classList.add("dragging");
    e.dataTransfer.setData("text/plain", t.id);
    try { e.dataTransfer.effectAllowed = 'move'; } catch(_){}
    try { if (e.dataTransfer.setDragImage) e.dataTransfer.setDragImage(el, dragMeta.offX, dragMeta.offY); } catch(_){}
  });

  el.addEventListener("dragend",()=>{
    // 드롭 이벤트 누락 시 마지막 진입 존으로 확정
    if (lastDropZone && draggingId) {
      moveTo(lastDropZone.dataset.group, lastDropZone.dataset.level, draggingId);
    }
    draggingId = null;
    draggingEl = null;
    lastDropZone = null;
    draggingGroup = null;
    dragMeta = { w:0, h:0, offX:0, offY:0 };
    el.classList.remove("dragging");
  });

  return el;
}

/* ===================================
   5) 상태 업데이트 + 정렬 + 부분 렌더
=================================== */
function moveTo(group, level, id){
  const g=state.assign[group];
  const prevLevel = getLevel(group, id);

  // 모든 레벨에서 제거
  for(const lv of Object.keys(g)){
    const i = g[lv].indexOf(id);
    if(i>=0) g[lv].splice(i,1);
  }

  // 목표 레벨에 추가 후 정렬
  g[level].push(id);
  sortById(g[level]);

  // DOM: 이전/목표 레벨만 부분 렌더
  if (prevLevel) renderLevel(group, prevLevel);
  renderLevel(group, level);

  updateCounts();
}

/* ===================================
   6) 최초 렌더
=================================== */
function renderInitial(){
  document.querySelectorAll(".drop").forEach(el=>el.innerHTML="");
  ["impact","feasibility"].forEach(group=>{
    Object.keys(state.assign[group]).forEach(level=>{
      renderLevel(group, level);
    });
  });
  updateCounts();
}

/* ===================================
   7) 히트테스트 (드롭 순간 '카드 몸'의 가로 겹침 길이 기준)
=================================== */
function getDragRectAt(clientX, clientY){
  const left = clientX - dragMeta.offX;
  const top  = clientY - dragMeta.offY;
  return { left, top, right:left + dragMeta.w, bottom:top + dragMeta.h, width:dragMeta.w, height:dragMeta.h };
}
function getRect(el){
  const r = el.getBoundingClientRect();
  return { left:r.left, top:r.top, right:r.right, bottom:r.bottom, width:r.width, height:r.height };
}
function overlapWidth(a,b){
  return Math.max(0, Math.min(a.right,b.right) - Math.max(a.left,b.left));
}
function centerX(r){ return r.left + r.width/2; }

function pickBestDropZoneByXOverlap(clientX, clientY){
  if (!draggingGroup) return null;
  const zones = Array.from(document.querySelectorAll(`.drop[data-group="${draggingGroup}"]`));
  if (zones.length === 0) return null;

  const dragRect = getDragRectAt(clientX, clientY);

  let best = null;
  let bestW = -1;

  for (const z of zones){
    const zr = getRect(z);
    const w = overlapWidth(dragRect, zr); // ★ 가로 겹침 길이
    if (w > bestW){
      bestW = w;
      best = z;
    }
  }

  if (bestW > 0) return best;

  // 전부 0이면: 가로 중심 가장 가까운 칸으로 보정
  zones.sort((a,b)=>{
    const ra = getRect(a), rb = getRect(b);
    const da = Math.abs(centerX(ra) - (dragRect.left + dragRect.width/2));
    const db = Math.abs(centerX(rb) - (dragRect.left + dragRect.width/2));
    return da - db;
  });
  return zones[0] || null;
}

/* ===================================
   8) DnD 배선
=================================== */
function wireDnD(){
  // 문서 레벨: 드롭 허용 및 최적 존 추적
  document.addEventListener('dragover', e=>{
    e.preventDefault();
    try { if (e.dataTransfer) e.dataTransfer.dropEffect = 'move'; } catch(_){}
    const best = pickBestDropZoneByXOverlap(e.clientX, e.clientY);
    if (best) lastDropZone = best;
  }, {capture:true});

  document.addEventListener('dragenter', e=>{
    const zone = e.target.closest?.('.drop');
    if (zone) lastDropZone = zone; // fallback
  }, {capture:true});

  document.addEventListener('drop', e=>{
    e.preventDefault();
    const id = draggingId || e.dataTransfer?.getData('text/plain');
    if (!id) return;

    const best = pickBestDropZoneByXOverlap(e.clientX, e.clientY) || lastDropZone;
    if (best){
      moveTo(best.dataset.group, best.dataset.level, id);
      lastDropZone = null;
    }
  }, {capture:true});

  // 각 컨테이너에도 직접 부착(브라우저별 안정성)
  document.querySelectorAll('.drop').forEach(zone=>{
    zone.addEventListener('dragover', e=>{ e.preventDefault(); });
    zone.addEventListener('dragenter', ()=>{ lastDropZone = zone; });
    zone.addEventListener('drop', e=>{
      e.preventDefault();
      const id = draggingId || e.dataTransfer?.getData('text/plain');
      if (!id) return;
      const best = pickBestDropZoneByXOverlap(e.clientX, e.clientY) || zone;
      moveTo(best.dataset.group, best.dataset.level, id);
      lastDropZone = null;
    });
  });
}

/* === 카운터 배지 업데이트 === */
function updateCounts(){
  const groups=["impact","feasibility"];
  const levels=["Unassigned","High","Medium","Low"];
  for(const g of groups){
    for(const lv of levels){
      const el = document.getElementById(`count-${g}-${lv}`);
      if(el){
        const count = state.assign[g][lv].length;
        el.textContent = count;
      }
    }
  }
}

/* ===================================
   9) 제출 → Git 저장 요청
=================================== */
async function handleSubmit(){
  const team=document.getElementById("team").value.trim();
  const name=document.getElementById("name").value.trim();
  const msg=document.getElementById("msg");
  const btn=document.getElementById("submitBtn");

  if(!team||!name){
    msg.innerHTML='<span class="err">팀/이름 입력 필요</span>';
    return;
  }

  // Unassigned 남아있으면 제출 금지
  const unassignedImpact = state.assign.impact.Unassigned.length;
  const unassignedFeas = state.assign.feasibility.Unassigned.length;

  if (unassignedImpact > 0 || unassignedFeas > 0) {
    msg.innerHTML = '<span class="err">⚠️ 모든 카드를 High / Medium / Low 중 하나에 배치해야 제출할 수 있습니다.</span>';
    return;
  }

  // 제출 데이터
  const items=state.tasks.map(t=>({
    projectId:t.id,
    projectTitle:t.title,
    impact:getLevel("impact",t.id),
    feasibility:getLevel("feasibility",t.id)
  }));

  const payload={ team,name, timestamp:new Date().toISOString(), data:items };

  btn.disabled=true;
  btn.textContent="저장 중...";
  msg.innerHTML="저장 중...";

  try{
    const res=await fetch(WEBHOOK_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(payload)
    });
    const json = await res.json().catch(()=> ({}));
    if(!res.ok) throw new Error(json.error || res.status);

    msg.innerHTML='<span class="ok">Git 저장 완료!</span>';
    btn.textContent="저장 완료";

  }catch(e){
    console.error(e);
    msg.innerHTML='<span class="err">저장 실패</span>';
    btn.disabled=false;
    btn.textContent="제출";
  }
}

/* ===================================
   10) 초기화
=================================== */
function init(){
  state.tasks = buildTasks();
  const ids = state.tasks.map(t=>t.id);

  // 기본값 세팅(정렬)
  state.assign.impact.Unassigned=[...ids];       sortById(state.assign.impact.Unassigned);
  state.assign.feasibility.Unassigned=[...ids];  sortById(state.assign.feasibility.Unassigned);

  renderInitial();
  wireDnD();
  document.getElementById("submitBtn").addEventListener("click",handleSubmit);
}

init();
</script>
